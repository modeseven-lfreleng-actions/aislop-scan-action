---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Example: organisation-wide aislop scan.
#
# Deploy this once and run it across repositories via an organisation
# ruleset (a required workflow). Copy it into the organisation's `.github`
# repository (or a designated repository) and reference it from the
# ruleset; no per-repository file is then needed. Pull requests scan the
# changed files; default-branch pushes scan the full repository and hand
# the SARIF to a separate upload job that holds `security-events: write`.
#
# Pin the action to a commit SHA and record the version in a comment.

name: 'AI Slop Scan 🧹'

# yamllint disable-line rule:truthy
on:
  pull_request:
  push:

permissions: {}

jobs:
  scan:
    name: 'Scan for AI slop'
    if: >-
      github.event_name != 'push'
      || github.ref_name == github.event.repository.default_branch
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: 'Harden runner'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository under audit'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Full history so changes mode can resolve the merge base of
          # the pull request branch against the base branch.
          fetch-depth: 0
          persist-credentials: false

      - name: 'Run aislop scan'
        id: 'scan'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/aislop-scan-action@0000000000000000000000000000000000000000  # vX.Y.Z
        with:
          # yamllint disable-line rule:line-length
          scan-mode: ${{ github.event_name == 'pull_request' && 'changes' || 'full' }}
          # yamllint disable-line rule:line-length
          base: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}

      - name: 'Upload SARIF artifact'
        # Only needed on default-branch pushes, where the upload job
        # consumes it; pull request runs skip the upload entirely.
        if: >-
          github.event_name == 'push'
          && github.ref_name == github.event.repository.default_branch
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: 'aislop-sarif'
          path: '${{ steps.scan.outputs.sarif-file }}'
          retention-days: 5
          if-no-files-found: 'error'

  upload:
    name: 'Publish SARIF to code scanning'
    needs: 'scan'
    if: >-
      github.event_name == 'push'
      && github.ref_name == github.event.repository.default_branch
    runs-on: 'ubuntu-latest'
    timeout-minutes: 5
    permissions:
      security-events: write
      # Lets upload-sarif read workflow run information on private
      # repositories (harmless on public ones).
      actions: read
    steps:
      - name: 'Harden runner'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Download SARIF artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: 'aislop-sarif'
          path: '.'

      - name: 'Upload SARIF to code scanning'
        # yamllint disable-line rule:line-length
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: 'aislop.sarif'
          # Category groups these results in code scanning.
          category: 'aislop'
        continue-on-error: true
